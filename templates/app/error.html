{% extends "app/layout.html" %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem; color: #fff;">
    <div style="font-size: 4rem; margin-bottom: 2rem;">✋</div>
    <h2 style="font-weight: 700; margin-bottom: 1rem;">{{ message or "Please open this app from Telegram." }}</h2>
    <p style="opacity: 0.7; font-size: 0.9rem;">
        This app requires a valid Telegram session. If you are seeing this inside Telegram, please wait a moment while we authenticate you.
    </p>
    
    <div id="loading-spinner" style="margin-top: 2rem;">
        <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--tg-theme-button-color, #248bcf);"></i>
    </div>
</div>

<script>
    // If we're not redirected in 5 seconds, show a manual button
    setTimeout(function() {
        document.getElementById('loading-spinner').innerHTML = `
            <button onclick="location.reload()" style="background: var(--tg-theme-button-color, #248bcf); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 600; margin-top: 1rem;">
                Retry Authentication
            </button>
        `;
    }, 5000);
</script>
{% endblock %}
